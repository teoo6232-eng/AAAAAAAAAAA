name: Generate MONSTER Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Create MONSTER project
        run: |
          mkdir -p monster
          cd monster
          
          cat > README.md << 'EOF'
          # MONSTER - Ultimate API Finder & Checker Generator
          Version: 1.0.0
          Author: teoo6232-eng
          
          ## Download Full Source
          See releases for complete 30K+ lines of Go code
          EOF
          
          cat > go.mod << 'EOF'
          module monster
          go 1.22
          
          require (
            github.com/PuerkitoBio/goquery v1.8.1
            github.com/fatih/color v1.16.0
            github.com/mattn/go-sqlite3 v1.14.19
            gopkg.in/yaml.v3 v3.0.1
          )
          EOF
          
          cat > config.yaml << 'EOF'
          general:
            threads: 1000
            timeout: 10
          scanner:
            max_depth: 5
          EOF

      - name: Create ZIP
        run: |
          zip -r monster-v1.0.0.zip monster/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          name: "MONSTER v1.0.0 - Structure"
          body: |
            MONSTER Project Structure
            Download and add full source code (30K+ lines)
          files: monster-v1.0.0.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
